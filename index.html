<script>
// ============================================================
// CONJURE - Three Engines: NanoBanana, Morph, Z-Image
// ============================================================

const NANO_PROXY = '/api/generate';
const UPLOAD_PROXY = '/api/upload';
const MORPH_PROXY = '/api/morph';
const ZIMAGE_PROXY = '/api/zimage';

const PROMPTS = [
  "A ethereal goddess of the moon, flowing silver hair, glowing lunar tattoos, floating in a cosmic void with stars reflecting in her eyes, fantasy art, WLOP style, artstation trending, hyper-detailed, 8k",
  "A samurai warrior in neon-lit cyberpunk city streets at night, holding a plasma katana, rain soaked ground reflecting holographic advertisements, cinematic lighting, blade runner vibe, photorealistic, 8k",
  "Surreal dreamscape of floating islands with upside-down waterfalls, glowing flora, giant mushrooms, soft pastel colors, studio ghibli inspired, whimsical, detailed illustration",
  "A cozy witch's cottage interior at golden hour, potion bottles glowing, spellbook open, cat sleeping by the fireplace, warm candlelight, detailed digital painting, lo-fi aesthetic",
  "Underwater bioluminescent forest, ancient sunken ruins, glowing coral, fish with ethereal light trails, deep ocean mystery, subnautica vibes, highly detailed, vibrant colors",
  "Two old friends playing chess in a Central Park autumn afternoon, golden leaves falling, warm sunlight through trees, candid moment, nostalgic film photography look, medium format",
  "A mechanical dragon made of brass and copper, gears visible, flying over a steampunk city at sunset, airships in background, intricate details, industrial fantasy, concept art",
  "A lone astronaut discovering a giant alien monolith covered in glowing runes on an icy exoplanet, aurora in sky, sci-fi, dramatic lighting, photorealistic, 8k",
  "An abandoned library overgrown with vines and moss, sunlight beams through broken stained glass window, dust particles floating, mysterious atmosphere, liminal space, cinematic",
  "A polar bear walking through a tiny pastel-colored village during cherry blossom season, whimsical, storybook illustration style, soft lighting, warm colors"
];

const MORPH_PROMPTS = [
  "Make it look like a watercolor painting, soft edges, color bleeding, artistic",
  "Transform into cyberpunk style, neon lights, dark atmosphere, purple and blue tones",
  "Apply vintage film look, add grain, fade colors, 1970s aesthetic",
  "Convert to anime/manga style, bold lines, vibrant colors, cel-shaded",
  "Make it look like an oil painting, visible brushstrokes, rich textures, impressionist",
  "Apply dramatic cinematic lighting, deep shadows, rim light, movie poster quality",
  "Transform into pixel art style, 8-bit retro game aesthetic, blocky but detailed",
  "Make it look like a charcoal sketch, black and white, rough textures, artistic"
];

// DOM Elements
const promptEl = document.getElementById('prompt');
const charcountEl = document.getElementById('charcount');
const genBtn = document.getElementById('genBtn');
const statusEl = document.getElementById('statusEl');
const statusText = document.getElementById('statusText');
const errEl = document.getElementById('errEl');
const resultEl = document.getElementById('resultEl');
const resultImg = document.getElementById('resultImg');
const engineBadge = document.getElementById('engineBadge');
const saveBtn = document.getElementById('saveBtn');
const controlsRow = document.getElementById('controlsRow');
const editNotice = document.getElementById('editNotice');
const editSection = document.getElementById('editSection');
const editSectionLabel = document.getElementById('editSectionLabel');
const editSectionOptional = document.getElementById('editSectionOptional');
const editRequiredBadge = document.getElementById('editRequiredBadge');
const editUrl = document.getElementById('editUrl');
const fileInput = document.getElementById('fileInput');
const dropzone = document.getElementById('dropzone');
const uploadPreview = document.getElementById('uploadPreview');
const previewImg = document.getElementById('previewImg');
const previewName = document.getElementById('previewName');
const uploadStatus = document.getElementById('uploadStatus');
const clearUpload = document.getElementById('clearUpload');

// State
let activeEngine = 'nano';
let activeTab = 'url';
let activeRatio = '1:1';
let activeRes = '2K';
let uploadedUrl = null;
let uploadInProgress = false;
let nanoUsed = [];
let morphUsed = [];
let zimageUsed = [];

// --- Helpers ---

function updateCount() {
  const n = promptEl.value.length;
  charcountEl.innerText = n + ' character' + (n === 1 ? '' : 's');
}

function setPrompt(text) {
  promptEl.value = text;
  updateCount();
}

function nextPrompt(list, usedArr) {
  if (usedArr.length >= list.length) usedArr.length = 0;
  let idx;
  do { idx = Math.floor(Math.random() * list.length); } while (usedArr.includes(idx));
  usedArr.push(idx);
  return list[idx];
}

function getImageSource() {
  if (activeTab === 'url') return editUrl.value.trim() || null;
  return uploadedUrl || null;
}

// --- Shuffle ---

document.getElementById('shuffle').addEventListener('click', () => {
  if (activeEngine === 'morph') setPrompt(nextPrompt(MORPH_PROMPTS, morphUsed));
  else setPrompt(nextPrompt(PROMPTS, nanoUsed));
});

// --- Upload ---

async function uploadToProxy(file) {
  uploadInProgress = true;
  try {
    const formData = new FormData();
    formData.append('image', file);
    const res = await fetch(UPLOAD_PROXY, { method: 'POST', body: formData });
    const data = await res.json();
    if (data.success) {
      uploadedUrl = data.data.url;
      uploadStatus.className = 'upload-status done';
      uploadStatus.innerHTML = '✓ Ready';
    } else {
      throw new Error(data.error || 'Upload failed');
    }
  } catch (e) {
    uploadStatus.className = 'upload-status fail';
    uploadStatus.innerHTML = '✕ Upload failed';
    uploadedUrl = null;
  }
  uploadInProgress = false;
  syncControls();
}

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  uploadedUrl = null;
  previewName.innerText = file.name;
  uploadStatus.className = 'upload-status uploading';
  uploadStatus.innerHTML = '<span class="mini-spin"></span> Uploading...';
  uploadPreview.classList.add('show');

  const reader = new FileReader();
  reader.onloadend = () => { previewImg.src = reader.result; };
  reader.readAsDataURL(file);
  uploadToProxy(file);
}

fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) handleFile(fileInput.files[0]);
});

dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropzone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

clearUpload.addEventListener('click', () => {
  uploadedUrl = null;
  uploadPreview.classList.remove('show');
  previewImg.src = '';
  fileInput.value = '';
  syncControls();
});

// --- Edit tabs ---

const editTabs = document.querySelectorAll('.edit-tab');
const editPanels = document.querySelectorAll('.edit-panel');

editTabs.forEach(tab => {
  tab.addEventListener('click', () => {
    editTabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeTab = tab.dataset.tab;
    editPanels.forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + activeTab).classList.add('active');
    syncControls();
  });
});

editUrl.addEventListener('input', syncControls);

// --- Ratio ---

const ratios = document.querySelectorAll('.ratio');

function setRatio(ratio) {
  activeRatio = ratio;
  ratios.forEach(r => r.classList.toggle('active', r.dataset.r === ratio));
}

ratios.forEach(r => r.addEventListener('click', () => setRatio(r.dataset.r)));

// --- Resolution ---

const resBtns = document.querySelectorAll('.res-btn');

function setRes(res) {
  activeRes = res;
  resBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.res === res));
}

resBtns.forEach(btn => btn.addEventListener('click', () => setRes(btn.dataset.res)));

// --- Engine switching & control sync ---

const engineBtns = document.querySelectorAll('.engine-btn');

function isEditMode() {
  // Only NanoBanana has the "edit mode locks ratio/res" behavior
  if (activeEngine !== 'nano') return false;
  return getImageSource() !== null;
}

function syncControls() {
  if (activeEngine === 'morph') {
    controlsRow.style.display = 'none';
    editNotice.style.display = 'none';
    return;
  }

  const editMode = isEditMode();
  controlsRow.style.display = editMode ? 'none' : '';
  editNotice.style.display = editMode ? 'flex' : 'none';

  if (editMode) {
    setRatio('1:1');
    setRes('1K');
  }
}

function syncEngineUI() {
  const isNano = activeEngine === 'nano';
  const isMorph = activeEngine === 'morph';

  // Show edit section for all engines
  editSection.classList.toggle('visible', true);

  // Hide nano-only ratios (3:4) when not on NanoBanana
  document.querySelectorAll('.nano-only').forEach(el => {
    el.style.display = isNano ? '' : 'none';
  });

  if (isMorph) {
    editSectionLabel.innerText = 'Image to transform';
    editSectionOptional.style.display = 'none';
    editRequiredBadge.style.display = '';
    promptEl.placeholder = "Describe how to transform the image... (e.g., 'make it look like watercolor painting')";
    setPrompt(nextPrompt(MORPH_PROMPTS, morphUsed));
  } else {
    editSectionLabel.innerText = 'Image to edit';
    editSectionOptional.style.display = '';
    editRequiredBadge.style.display = 'none';
    promptEl.placeholder = 'Describe what you want to see... fantasy, cyberpunk, realistic, any style';
    setPrompt(nextPrompt(PROMPTS, nanoUsed));
  }

  syncControls();
}

engineBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    engineBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeEngine = btn.dataset.engine;
    syncEngineUI();
  });
});

// --- Generate ---

const genMsgs = ['Painting pixels...', 'Summoning magic...', 'Sharpening details...', 'Conjuring your vision...', 'Applying final touches...'];

genBtn.addEventListener('click', async () => {
  const promptText = promptEl.value.trim();
  errEl.classList.remove('show');
  resultEl.classList.remove('show');

  if (!promptText) {
    errEl.innerText = '✕ Please enter a prompt describing what you want to create.';
    errEl.classList.add('show');
    return;
  }

  // Morph requires an image
  if (activeEngine === 'morph') {
    if (!getImageSource()) {
      errEl.innerText = '✕ Morph requires an image. Please paste a URL or upload an image to transform.';
      errEl.classList.add('show');
      return;
    }
  }

  const imageSource = getImageSource();

  genBtn.disabled = true;
  statusText.innerText = genMsgs[Math.floor(Math.random() * genMsgs.length)];
  statusEl.classList.add('show');

  try {
    let response, data, resultUrl;

    if (activeEngine === 'morph') {
      response = await fetch(MORPH_PROXY, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image_url: imageSource, prompt: promptText }),
      });
      data = await response.json();
      if (!data.success) throw new Error(data.error || 'Morph failed');
      resultUrl = data.output;
      engineBadge.innerText = 'via Morph · Transform';

    } else if (activeEngine === 'zimage') {
      response = await fetch(ZIMAGE_PROXY, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          prompt: promptText,
          image_url: imageSource,
          aspect_ratio: activeRatio,
          resolution: activeRes,
        }),
      });
      data = await response.json();
      if (!data.success) throw new Error(data.error || 'Z-Image failed');
      resultUrl = data.output;
      engineBadge.innerText = 'via Z-Image · ' + activeRes + ' · ' + activeRatio;

    } else {
      // NanoBanana
      response = await fetch(NANO_PROXY, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          prompt: promptText,
          image_url: imageSource,
          aspect_ratio: activeRatio,
          resolution: activeRes,
        }),
      });
      data = await response.json();
      if (!data.success) throw new Error(data.error || 'Generation failed');
      resultUrl = data.output;
      engineBadge.innerText = 'via NanoBanana · ' + activeRes + ' · ' + activeRatio;
    }

    // Unwrap array output (Replicate sometimes returns ["url"])
    if (Array.isArray(resultUrl)) resultUrl = resultUrl[0];
    if (resultUrl && typeof resultUrl === 'object' && resultUrl.url) resultUrl = resultUrl.url;

    if (!resultUrl) throw new Error('No image URL in response');

    statusEl.classList.remove('show');
    resultImg.src = resultUrl;
    resultEl.classList.add('show');

    // Auto-refresh prompt for next generation
    setTimeout(() => {
      if (activeEngine === 'morph') setPrompt(nextPrompt(MORPH_PROMPTS, morphUsed));
      else setPrompt(nextPrompt(PROMPTS, nanoUsed));
    }, 100);

  } catch (error) {
    statusEl.classList.remove('show');
    errEl.innerText = error.message || 'Something went wrong. Please try again.';
    errEl.classList.add('show');
  } finally {
    genBtn.disabled = false;
  }
});

// --- Save ---

saveBtn.addEventListener('click', () => {
  const link = document.createElement('a');
  link.href = resultImg.src;
  link.download = 'conjure-' + Date.now() + '.png';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
});

// --- Init ---

promptEl.addEventListener('input', updateCount);
setPrompt(nextPrompt(PROMPTS, nanoUsed));
syncEngineUI();
</script>
