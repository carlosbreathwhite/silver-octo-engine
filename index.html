<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conjure — Summon anything into existence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #f5f5f0; --surface: #ffffff; --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.22); --text-primary: #111111; --text-secondary: #555555; --text-tertiary: #999999; --danger-bg: #fff0f0; --danger-text: #c0392b; --success-bg: #f0fff4; --success-text: #1a7a3c; --radius-md: 12px; --radius-lg: 20px; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; color: var(--text-primary); }
    .shell { width: 100%; max-width: 500px; }
    .header { text-align: center; margin-bottom: 2rem; }
    .wordmark { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 0.6rem; }
    .logo { width: 36px; height: 36px; background: var(--text-primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .logo svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .brand { font-size: 22px; font-weight: 500; letter-spacing: -0.4px; }
    .tagline { font-size: 13px; color: var(--text-tertiary); }
    .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.75rem 1.5rem; }
    .field-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 8px; display: block; }
    .engine-row { display: flex; gap: 8px; margin-bottom: 1.4rem; }
    .engine-btn { flex: 1; background: #f7f7f5; border: 0.5px solid var(--border); border-radius: 10px; padding: 10px 12px; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; align-items: flex-start; gap: 2px; font-family: 'DM Sans', sans-serif; text-align: left; }
    .engine-btn:hover { border-color: var(--border-strong); }
    .engine-btn.active { background: var(--text-primary); border-color: var(--text-primary); }
    .engine-name { font-size: 13px; font-weight: 500; color: var(--text-secondary); transition: color 0.15s; }
    .engine-btn.active .engine-name { color: #fff; }
    .engine-tag { font-size: 10px; color: var(--text-tertiary); letter-spacing: 0.04em; transition: color 0.15s; }
    .engine-btn.active .engine-tag { color: rgba(255,255,255,0.55); }
    .section-divider { border: none; border-top: 0.5px solid var(--border); margin: 1.25rem 0; }
    .textarea-wrap { position: relative; }
    textarea { width: 100%; background: #f7f7f5; border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 12px 14px 38px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.6; color: var(--text-primary); resize: none; outline: none; transition: border-color 0.15s; }
    textarea::placeholder { color: var(--text-tertiary); }
    textarea:focus { border-color: var(--border-strong); background: #fff; }
    .toolbar { position: absolute; bottom: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; pointer-events: none; }
    .charcount { font-size: 11px; color: var(--text-tertiary); }
    .shuffle-btn { pointer-events: all; background: none; border: 0.5px solid var(--border); border-radius: 6px; padding: 3px 9px; font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--text-tertiary); cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all 0.15s; }
    .shuffle-btn:hover { color: var(--text-secondary); border-color: var(--border-strong); background: #f0f0ec; }
    .spin { display: inline-block; transition: transform 0.35s; }
    .shuffle-btn:hover .spin { transform: rotate(180deg); }
    .edit-section { margin-top: 1rem; display: none; }
    .edit-section.visible { display: block; }
    .edit-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
    .edit-tab { background: #f7f7f5; border: 0.5px solid var(--border); border-radius: 8px; padding: 5px 14px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; color: var(--text-tertiary); cursor: pointer; transition: all 0.15s; }
    .edit-tab.active { background: #fff; border-color: var(--border-strong); color: var(--text-primary); }
    .edit-panel { display: none; }
    .edit-panel.active { display: block; }
    .edit-input { width: 100%; background: #f7f7f5; border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text-primary); outline: none; transition: border-color 0.15s; }
    .edit-input::placeholder { color: var(--text-tertiary); }
    .edit-input:focus { border-color: var(--border-strong); background: #fff; }
    .edit-hint { font-size: 11px; color: var(--text-tertiary); margin-top: 5px; }
    .dropzone { border: 1.5px dashed var(--border-strong); border-radius: var(--radius-md); padding: 20px 14px; text-align: center; cursor: pointer; transition: all 0.15s; background: #f7f7f5; position: relative; }
    .dropzone:hover, .dropzone.dragover { border-color: var(--text-primary); background: #f0f0ec; }
    .dropzone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .dropzone-icon { font-size: 22px; margin-bottom: 6px; }
    .dropzone-text { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
    .dropzone-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 3px; }
    .upload-preview { display: none; margin-top: 10px; border-radius: var(--radius-md); border: 0.5px solid var(--border); overflow: hidden; position: relative; }
    .upload-preview.show { display: block; }
    .upload-preview img { width: 100%; display: block; max-height: 180px; object-fit: cover; }
    .upload-preview-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #f7f7f5; border-top: 0.5px solid var(--border); }
    .upload-preview-name { font-size: 12px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
    .upload-status { font-size: 11px; font-weight: 500; display: flex; align-items: center; gap: 5px; }
    .upload-status.uploading { color: var(--text-tertiary); }
    .upload-status.done { color: var(--success-text); }
    .upload-status.fail { color: var(--danger-text); }
    .upload-clear { background: none; border: none; font-size: 16px; cursor: pointer; color: var(--text-tertiary); padding: 0 4px; line-height: 1; }
    .upload-clear:hover { color: var(--text-primary); }
    .mini-spin { width: 10px; height: 10px; border: 1.5px solid rgba(0,0,0,0.15); border-top-color: var(--text-secondary); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .controls-row { display: flex; gap: 10px; margin: 1.2rem 0; align-items: flex-start; }
    .controls-col { flex: 1; }
    .ratios { display: flex; gap: 6px; flex-wrap: wrap; }
    .ratio { background: #f7f7f5; border: 0.5px solid var(--border); border-radius: 8px; padding: 7px 5px 6px; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 48px; }
    .ratio-icon { border: 1.5px solid rgba(0,0,0,0.2); border-radius: 2px; transition: border-color 0.15s; }
    .ratio-name { font-size: 10px; font-weight: 500; color: var(--text-secondary); transition: color 0.15s; white-space: nowrap; }
    .ratio.active { background: #fff; border-color: var(--border-strong); }
    .ratio.active .ratio-icon { border-color: var(--text-primary); }
    .ratio.active .ratio-name { color: var(--text-primary); }
    .res-group { display: flex; gap: 6px; }
    .res-btn { flex: 1; background: #f7f7f5; border: 0.5px solid var(--border); border-radius: 8px; padding: 8px 4px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; color: var(--text-secondary); cursor: pointer; transition: all 0.15s; text-align: center; }
    .res-btn:hover { border-color: var(--border-strong); }
    .res-btn.active { background: #fff; border-color: var(--border-strong); color: var(--text-primary); }
    .gen-btn { width: 100%; background: var(--text-primary); color: #fff; border: none; border-radius: var(--radius-md); padding: 13px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 1.25rem; transition: opacity 0.15s, transform 0.1s; }
    .gen-btn:hover { opacity: 0.82; }
    .gen-btn:active { transform: scale(0.99); opacity: 0.7; }
    .gen-btn:disabled { opacity: 0.35; cursor: default; transform: none; }
    .status { display: none; align-items: center; gap: 10px; padding: 12px 14px; background: #f7f7f5; border-radius: 10px; margin-top: 1rem; }
    .status.show { display: flex; }
    .track { flex: 1; height: 2px; background: rgba(0,0,0,0.1); border-radius: 99px; overflow: hidden; }
    .bar { height: 100%; width: 0%; background: var(--text-primary); border-radius: 99px; animation: sweep 2s ease-in-out infinite; }
    @keyframes sweep { 0%{width:0%;margin-left:0} 55%{width:55%} 85%{width:90%} 100%{width:0%;margin-left:100%} }
    .status-text { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
    .err { display: none; font-size: 13px; color: var(--danger-text); background: var(--danger-bg); border-radius: 10px; padding: 11px 14px; margin-top: 1rem; }
    .err.show { display: block; }
    .result { display: none; }
    .result.show { display: block; }
    .sep { border: none; border-top: 0.5px solid var(--border); margin: 1.5rem 0; }
    .result-img { width: 100%; display: block; border-radius: 14px; border: 0.5px solid var(--border); }
    .img-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
    .img-meta-left { display: flex; flex-direction: column; gap: 2px; }
    .expire { font-size: 12px; color: var(--text-tertiary); }
    .engine-badge { font-size: 11px; color: var(--text-tertiary); }
    .save-btn { background: #f7f7f5; border: 0.5px solid var(--border); border-radius: 8px; padding: 6px 12px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; gap: 5px; transition: background 0.15s; }
    .save-btn:hover { background: #efefec; }
    @keyframes fade-up { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
    textarea.refreshed { animation: fade-up 0.28s ease; }
  </style>
</head>

<div class="shell">
  <div class="header">
    <div class="wordmark">
      <div class="logo"><svg viewBox="0 0 24 24"><path d="M15 4.5l-3-1.5-3 1.5v3L6 9l-1.5 3L6 15l3 1.5v3l3 1.5 3-1.5v-3L18 15l1.5-3L18 9l-3-1.5v-3z"/><circle cx="12" cy="12" r="2.5"/></svg></div>
      <span class="brand">Conjure</span>
    </div>
    <p class="tagline">Describe anything. Watch it appear.</p>
  </div>
  <div class="card">
    <label class="field-label">Engine</label>
    <div class="engine-row">
      <button class="engine-btn" id="eng-flux" data-engine="flux"><span class="engine-name">Flux MAX</span><span class="engine-tag">Fast · Text to image</span></button>
      <button class="engine-btn active" id="eng-nano" data-engine="nano"><span class="engine-name">NanoBanana</span><span class="engine-tag">4K · Edit · Upload</span></button>
    </div>
    <hr class="section-divider">
    <label class="field-label" for="prompt">Prompt</label>
    <div class="textarea-wrap">
      <textarea id="prompt" rows="3"></textarea>
      <div class="toolbar">
        <span class="charcount" id="charcount">0 characters</span>
        <button class="shuffle-btn" id="shuffle"><span class="spin">↻</span> Inspire me</button>
      </div>
    </div>
    <div class="edit-section visible" id="editSection">
      <label class="field-label" style="margin-top:1rem;">Image to edit <span style="font-size:10px;text-transform:none;letter-spacing:0;color:var(--text-tertiary);font-weight:400;">(optional)</span></label>
      <div class="edit-tabs">
        <button class="edit-tab active" data-tab="url">Paste URL</button>
        <button class="edit-tab" data-tab="upload">Upload from device</button>
      </div>
      <div class="edit-panel active" id="panel-url">
        <input class="edit-input" id="editUrl" type="url" placeholder="https://i.imgur.com/your-image.jpg">
        <p class="edit-hint">Direct image link — jpg, png, or webp</p>
      </div>
      <div class="edit-panel" id="panel-upload">
        <div class="dropzone" id="dropzone">
          <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
          <div class="dropzone-icon">↑</div>
          <p class="dropzone-text">Click or drag image here</p>
          <p class="dropzone-sub">jpg · png · webp · max 32MB</p>
        </div>
        <div class="upload-preview" id="uploadPreview">
          <img id="previewImg" src="" alt="Preview">
          <div class="upload-preview-bar">
            <span class="upload-preview-name" id="previewName"></span>
            <span class="upload-status uploading" id="uploadStatus"></span>
            <button class="upload-clear" id="clearUpload" title="Remove">✕</button>
          </div>
        </div>
      </div>
    </div>
    <div class="controls-row">
      <div class="controls-col">
        <label class="field-label">Ratio</label>
        <div class="ratios">
          <div class="ratio active" data-r="1:1"><div class="ratio-icon" style="width:22px;height:22px"></div><span class="ratio-name">1:1</span></div>
          <div class="ratio" data-r="16:9"><div class="ratio-icon" style="width:30px;height:17px"></div><span class="ratio-name">16:9</span></div>
          <div class="ratio" data-r="9:16"><div class="ratio-icon" style="width:15px;height:27px"></div><span class="ratio-name">9:16</span></div>
          <div class="ratio" data-r="4:3"><div class="ratio-icon" style="width:26px;height:20px"></div><span class="ratio-name">4:3</span></div>
          <div class="ratio nano-only" data-r="3:4"><div class="ratio-icon" style="width:18px;height:24px"></div><span class="ratio-name">3:4</span></div>
        </div>
      </div>
      <div class="controls-col" id="resCol">
        <label class="field-label">Resolution</label>
        <div class="res-group">
          <button class="res-btn" data-res="1K">1K</button>
          <button class="res-btn active" data-res="2K">2K</button>
          <button class="res-btn" data-res="4K">4K</button>
        </div>
      </div>
    </div>
    <button class="gen-btn" id="genBtn">✦ Conjure image</button>
    <div class="status" id="statusEl"><div class="track"><div class="bar"></div></div><span class="status-text" id="statusText">Generating...</span></div>
    <div class="err" id="errEl"></div>
    <div class="result" id="resultEl">
      <hr class="sep">
      <img class="result-img" id="resultImg" src="" alt="Generated image">
      <div class="img-meta">
        <div class="img-meta-left"><span class="expire">⏱ Temporary — save before it expires</span><span class="engine-badge" id="engineBadge"></span></div>
        <button class="save-btn" id="saveBtn">↓ Save</button>
      </div>
    </div>
  </div>
</div>
